name: changa
description: "Group contribution platform for Kenya — M-Pesa & Airtel Money"

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.8.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Network
  dio: ^5.9.2
  connectivity_plus: ^6.1.1

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  percent_indicator: ^4.2.5
  lottie: ^3.3.2
  fl_chart: ^0.69.0

  # Utilities
  intl: ^0.19.0
  dartz: ^0.10.1
  get_it: ^8.0.3
  image_picker: ^1.1.2

  cupertino_icons: ^1.0.8
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.4  # ← moved here from dependencies
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true

  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Light.ttf
          weight: 300
        - asset: assets/fonts/Sora-Regular.ttf
        - asset: assets/fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700
        - asset: assets/fonts/Sora-ExtraBold.ttf
          weight: 800
    - family: DM_Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/icons/svg/

# ── Launcher icon config ───────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B4332"
  adaptive_icon_foreground: "assets/icons/logo_white.png"
  web:
    generate: false